          {id:"N072",name:"Gloss Metallic Purple",      hex:"#4b0082", finish:"vmetal"},
          {id:"N073",name:"Gloss Metallic Burgundy",    hex:"#6d0f1a", finish:"vmetal"},
          {id:"N074",name:"Ghost Metallic Shadow Gold", hex:"#a08050", finish:"vghost"},
          {id:"N075",name:"Ghost Metallic Black Green", hex:"#1a2a1a", finish:"vghost"},
          {id:"N076",name:"Ghost Metallic Midnight Green",hex:"#0d2010",finish:"vghost"},
          {id:"N077",name:"Ghost Metallic Dark Blue",   hex:"#0d1a30", finish:"vghost"},
          {id:"N078",name:"Satin Midnight Purple",      hex:"#2d1250", finish:"vsatin"},
          {id:"N079",name:"Forget Carbon Glossy Black", hex:"#1a1a1a", finish:"vcarbon"},
          {id:"N080",name:"Forget Carbon Glossy Red",   hex:"#8b0000", finish:"vcarbon"},
          {id:"N081",name:"PET Satin Chrome Black",     hex:"#1a1a1a", finish:"vchr"},
          {id:"N082",name:"PET Satin Chrome Blue",      hex:"#1a2a5e", finish:"vchr"},
          {id:"N083",name:"PET Satin Chrome Romanee Red",hex:"#7a1a1a",finish:"vchr"},
          {id:"N084",name:"Splendid Midnight Purple",   hex:"#1a0a3a", finish:"vsatin"},
        ];

        /* Секции для PPF */
        const PPF_SECTIONS = [
          {key:"all",   label:"Все"},
          {key:"gloss", label:"✨ Gloss"},
          {key:"pearl", label:"🔮 Pearl"},
          {key:"chrome",label:"🪞 Chrome"},
          {key:"matt",  label:"🔲 Matt"},
          {key:"metal", label:"🔩 Metal"},
          {key:"ppf",   label:"🛡 PPF"},
        ];
        const PPF_SECTION_NAMES = {
          gloss:"✨ Gloss — Глянец", pearl:"🔮 Pearl — Перламутр",
          chrome:"🪞 Chrome — Хром", matt:"🔲 Matt — Матовый",
          metal:"🔩 Matt Metal — Металлик", ppf:"🛡️ PPF — Прозрачная",
        };
        const PPF_SECTION_ORDER = ["gloss","pearl","chrome","matt","metal","ppf"];

        /* Секции для Vinyl */
        const VINYL_SECTIONS = [
          {key:"all",      label:"Все"},
          {key:"vgloss",   label:"✨ Gloss"},
          {key:"vmatt",    label:"🔲 Matt"},
          {key:"vmetal",   label:"🔩 Metallic"},
          {key:"vsatin",   label:"🫧 Satin"},
          {key:"vghost",   label:"👻 Ghost"},
          {key:"vfantasy", label:"🌈 Fantasy"},
          {key:"vcoral",   label:"🪸 Coral"},
          {key:"vdiamond", label:"💎 Diamond"},
          {key:"vcarbon",  label:"🕷 Carbon"},
          {key:"vchr",     label:"🪞 Chrome"},
        ];
        const VINYL_SECTION_NAMES = {
          vgloss:"✨ Gloss — Глянец", vmatt:"🔲 Matt — Матовый",
          vmetal:"🔩 Metallic — Металлик", vsatin:"🫧 Satin — Сатин",
          vghost:"👻 Ghost — Хамелеон", vfantasy:"🌈 Fantasy — Фэнтези",
          vcoral:"🪸 Coral — Кораллы", vdiamond:"💎 Diamond — Бриллиант",
          vcarbon:"🕷️ Carbon — Карбон", vchr:"🪞 PET Chrome — Хром",
        };
        const VINYL_SECTION_ORDER = ["vgloss","vmatt","vmetal","vsatin","vghost","vfantasy","vcoral","vdiamond","vcarbon","vchr"];

        /* ===== ЛОГИКА ЦВЕТОВОГО МОДАЛА ===== */
        const colorModalOverlay = document.getElementById("colorModalOverlay");
        const colorModalTitle   = document.getElementById("colorModalTitle");
        const colorModalSubtitle= document.getElementById("colorModalSubtitle");
        const colorModalClose   = document.getElementById("colorModalClose");
        const colorSearch       = document.getElementById("colorSearch");
        const cmTabs            = document.getElementById("cmTabs");
        const cmScroll          = document.getElementById("cmScroll");
        const colorModalConfirm = document.getElementById("colorModalConfirm");
        const cmConfirmPreview  = document.getElementById("cmConfirmPreview");
        const cmConfirmNum      = document.getElementById("cmConfirmNum");
        const cmConfirmName     = document.getElementById("cmConfirmName");

        let _colorModalCallback = null;
        let _colorList = [];
        let _colorSections = [];
        let _colorSectionNames = {};
        let _colorSectionOrder = [];
        let _selectedColor = null;
        let _activeTab = "all";
        let _searchQ = "";

        function cmIsLight(hex) {
            const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
            return (0.299*r + 0.587*g + 0.114*b) > 155;
        }

        /* ===================================================
           ОСТАТКИ — загружаются fetch из JSON-файлов
           Формат JSON: [{"Количество":"X шт","Название":"#1 Name..."}]
           Для виниловой: [{"Количество":"X шт","Название":"N001 Name..."}]
           =================================================== */
        let STOCK_PPF   = {};   /* id(число) → qty(число) */
        let STOCK_VINYL = {};

        function parseStockArray(arr) {
            const map = {};
            (arr || []).forEach(item => {
                const m = String(item["Название"] || "").match(/[#Nn]0*(\d+)/);
                if (!m) return;
                const id  = parseInt(m[1], 10);
                const qty = parseInt(String(item["Количество"] || "0").replace(/\D/g, ""), 10) || 0;
                map[id] = qty;
            });
            return map;
        }

        async function loadStockFiles() {
            try {
                const r = await fetch("ostatok_colorPPF.json");
                if (r.ok) STOCK_PPF = parseStockArray(await r.json());
            } catch(e) { console.warn("ostatok_colorPPF.json не найден", e); }

            try {
                const r = await fetch("ostatok_colorVINIL.json");
                if (r.ok) STOCK_VINYL = parseStockArray(await r.json());
            } catch(e) { console.warn("ostatok_colorVINIL.json не найден", e); }
        }

        loadStockFiles();   /* запускаем сразу при старте страницы */

        /* Текущая карта остатков для открытого модала */
        let _stockMap = {};

        function getStockInfo(colorId) {
            const numId = typeof colorId === "string"
                ? parseInt(String(colorId).replace(/[Nn]/g, ""), 10)
                : colorId;
            if (!(numId in _stockMap)) return { cls: "unknown", text: "—" };
            const qty = _stockMap[numId];
            if (qty === 0)  return { cls: "low",  text: "Нет" };
            if (qty <= 4)   return { cls: "low",  text: `${qty} шт` };
            if (qty <= 9)   return { cls: "mid",  text: `${qty} шт` };
            return               { cls: "high", text: `${qty}+ шт` };
        }

        function openColorModal(filmName, colors, sections, sectionNames, sectionOrder, stockMap, onConfirm) {
            _colorList = colors;
            _colorSections = sections;
            _colorSectionNames = sectionNames;
            _colorSectionOrder = sectionOrder;
            _stockMap = stockMap || {};
            _selectedColor = null;
            _colorModalCallback = onConfirm;
            _activeTab = "all";
            _searchQ = "";

            colorModalTitle.textContent = filmName;
            colorModalSubtitle.textContent = `${colors.length} цветов на выбор`;
            colorSearch.value = "";
            cmConfirmPreview.style.background = "#1e1e1e";
            cmConfirmPreview.style.borderColor = "rgba(255,255,255,0.1)";
            cmConfirmNum.textContent = "";
            cmConfirmName.textContent = "Цвет не выбран";
            cmConfirmName.classList.add("placeholder");
            colorModalConfirm.disabled = true;

            buildCmTabs();
            renderCmGrid();
            colorModalOverlay.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        function closeColorModal() {
            colorModalOverlay.classList.remove("show");
            document.body.style.overflow = "";
        }

        function buildCmTabs() {
            cmTabs.innerHTML = "";
            _colorSections.forEach(s => {
                const btn = document.createElement("button");
                btn.className = "cm-tab" + (s.key === _activeTab ? " active" : "");
                btn.textContent = s.label;
                btn.addEventListener("click", () => {
                    _activeTab = s.key;
                    cmTabs.querySelectorAll(".cm-tab").forEach(t => t.classList.remove("active"));
                    btn.classList.add("active");
                    renderCmGrid();
                    cmScroll.scrollTop = 0;
                });
                cmTabs.appendChild(btn);
            });
        }

        function getCmFiltered() {
            return _colorList.filter(c => {
                const mf = _activeTab === "all" || c.finish === _activeTab;
                const q = _searchQ.trim().toLowerCase();
                const ms = !q || c.name.toLowerCase().includes(q) || String(c.id).toLowerCase().includes(q);
                return mf && ms;
            });
        }

        function cmAttachMouseTracking(card, swatch, finish) {
            const trackFinishes = ['gloss','pearl','chrome','metal','vgloss','vmetal','vchr','vghost','vfantasy','vdiamond'];
            if (!trackFinishes.includes(finish)) return;
            const cfg = {
                gloss:{s:70,a:0.38}, pearl:{s:90,a:0.22}, chrome:{s:110,a:0.50}, metal:{s:80,a:0.18},
                vgloss:{s:70,a:0.35}, vmetal:{s:80,a:0.20}, vchr:{s:110,a:0.50},
                vghost:{s:90,a:0.25}, vfantasy:{s:100,a:0.28}, vdiamond:{s:100,a:0.45},
            };
            const {s,a} = cfg[finish] || {s:70,a:0.3};
            const hl = document.createElement("div");
            hl.className = "cm-swatch-hl"; hl.style.opacity = "0";
            swatch.appendChild(hl);
            let rafId = null;
            card.addEventListener("mouseenter", () => { hl.style.opacity = "1"; });
            card.addEventListener("mouseleave", () => { hl.style.opacity = "0"; cancelAnimationFrame(rafId); });
            card.addEventListener("mousemove", e => {
                cancelAnimationFrame(rafId);
                rafId = requestAnimationFrame(() => {
                    const rect = swatch.getBoundingClientRect();
                    const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1);
                    const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1);
                    hl.style.background = `radial-gradient(circle ${s}% at ${x}% ${y}%, rgba(255,255,255,${a}) 0%, transparent 70%)`;
                });
            });
        }

        function makeCmCard(c, index) {
            const card = document.createElement("div");
            card.className = "cm-card";
            card.dataset.finish = c.finish;
            if (_selectedColor && _selectedColor.id === c.id) card.classList.add("selected");

            const light = cmIsLight(c.hex);
            const badgeStyle = light
                ? "background:rgba(0,0,0,0.18);color:rgba(0,0,0,0.65)"
                : "background:rgba(0,0,0,0.50);color:rgba(255,255,255,0.80)";

            const finishLabels = {
                gloss:"Gloss", pearl:"Pearl", chrome:"Chrome", matt:"Matt", metal:"Metal", ppf:"PPF",
                vgloss:"Gloss", vmatt:"Matt", vmetal:"Metallic", vchr:"Chrome",
                vsatin:"Satin", vghost:"Ghost", vfantasy:"Fantasy", vcoral:"Coral",
                vdiamond:"Diamond", vcarbon:"Carbon",
            };

            const stock = getStockInfo(c.id);

            card.innerHTML = `
                <div class="cm-swatch" style="background:${c.hex}">
                    <div class="cm-check">
                        <svg viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3"/></svg>
                    </div>
                    <span class="cm-finish-badge" style="${badgeStyle}">${finishLabels[c.finish] || c.finish}</span>
                </div>
                <div class="cm-label">
                    <div class="cm-label-num">${c.id}</div>
                    
                    <div class="cm-label-name">${c.name}</div>
                    <div class="cm-stock ${stock.cls}">
                        <div class="cm-stock-dot"></div>${stock.text}
                    </div>
                </div>
            `;

            const swatch = card.querySelector(".cm-swatch");
            cmAttachMouseTracking(card, swatch, c.finish);

            setTimeout(() => card.classList.add("visible"), Math.min(index * 15, 400));

            card.addEventListener("click", () => {
                document.querySelectorAll(".cm-card.selected").forEach(el => el.classList.remove("selected"));
                if (_selectedColor && _selectedColor.id === c.id) {
                    _selectedColor = null;
                    cmConfirmPreview.style.background = "#1e1e1e";
                    cmConfirmPreview.style.borderColor = "rgba(255,255,255,0.1)";
                    cmConfirmNum.textContent = "";
                    cmConfirmName.textContent = "Цвет не выбран";
                    cmConfirmName.classList.add("placeholder");
                    colorModalConfirm.disabled = true;
                    return;
                }
                _selectedColor = c;
                card.classList.add("selected");
                cmConfirmPreview.style.background = c.hex;
                cmConfirmPreview.style.borderColor = cmIsLight(c.hex) ? "#aaa" : c.hex;
                cmConfirmNum.textContent = `${c.id} · ${finishLabels[c.finish] || c.finish} · ${stock.text}`;
                cmConfirmName.textContent = c.name;
                cmConfirmName.classList.remove("placeholder");
                colorModalConfirm.disabled = false;
                card.scrollIntoView({ behavior: "smooth", block: "nearest" });
            });

            return card;
        }

        function renderCmGrid() {
            cmScroll.innerHTML = "";
            const filtered = getCmFiltered();
            if (!filtered.length) {
                cmScroll.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#444;font-size:0.9rem;">Ничего не найдено</div>`;
                return;
            }

            if (_activeTab === "all") {
                _colorSectionOrder.forEach(fin => {
                    const group = filtered.filter(c => c.finish === fin);
                    if (!group.length) return;
                    const label = document.createElement("div");
                    label.className = "cm-section-label";
                    label.textContent = _colorSectionNames[fin] || fin;
                    cmScroll.appendChild(label);
                    const grid = document.createElement("div");
                    grid.className = "cm-grid";
                    group.forEach((c, i) => grid.appendChild(makeCmCard(c, i)));
                    cmScroll.appendChild(grid);
                });
            } else {
                const grid = document.createElement("div");
                grid.className = "cm-grid";
                filtered.forEach((c, i) => grid.appendChild(makeCmCard(c, i)));
                cmScroll.appendChild(grid);
            }
        }

        colorSearch.addEventListener("input", () => {
            _searchQ = colorSearch.value;
            renderCmGrid();
            cmScroll.scrollTop = 0;
        });

        colorModalClose.addEventListener("click", closeColorModal);
        colorModalOverlay.addEventListener("click", (e) => {
            if (e.target === colorModalOverlay) closeColorModal();
        });

        colorModalConfirm.addEventListener("click", () => {
            if (_selectedColor && _colorModalCallback) {
                _colorModalCallback(_selectedColor);
                closeColorModal();
            }
        });

        /* ===== ОПРЕДЕЛЕНИЕ ЦВЕТОВ ПО НАЗВАНИЮ ПЛЁНКИ ===== */
        function getColorListForFilm(filmName) {
            if (!filmName) return null;
            const lower = filmName.toLowerCase();

            /* ----- VINYL ----- */
            if (lower.includes("vinyl") || lower.includes("винил")) {
                // Парсим диапазон N1–N84 из названия: "Sunmax Vinyl N1-N40" -> 1..40
                const rangeMatch = filmName.match(/[Nn](\d+)[-–—]?[Nn]?(\d+)?/);
                let vinylColors = VINYL_COLORS;
                let rangeLabel = "";
                if (rangeMatch) {
                    const from = parseInt(rangeMatch[1]);
                    const to   = rangeMatch[2] ? parseInt(rangeMatch[2]) : from;
                    vinylColors = VINYL_COLORS.filter(c => {
                        const num = parseInt(String(c.id).replace(/[Nn]/,""));
                        return num >= from && num <= to;
                    });
                    rangeLabel = ` (N${String(from).padStart(3,"0")}–N${String(to).padStart(3,"0")})`;
                }
                // Определяем секции на основе реальных finish в отфильтрованном списке
                const usedFinishes = new Set(vinylColors.map(c => c.finish));
                const filteredSections = VINYL_SECTIONS.filter(s => s.key === "all" || usedFinishes.has(s.key));
                const filteredSectionOrder = VINYL_SECTION_ORDER.filter(k => usedFinishes.has(k));
                return {
                    list: vinylColors,
                    label: filmName + rangeLabel,
                    sections: filteredSections,
                    sectionNames: VINYL_SECTION_NAMES,
                    sectionOrder: filteredSectionOrder,
                    stockMap: STOCK_VINYL,
                };
            }

            /* ----- PPF COLOR ----- */
            if (lower.includes("elite") || lower.includes("элит") ||
                lower.includes("color ppf") || lower.includes("цветная ppf") ||
                lower.includes("colour ppf") || lower.includes("color elite")) {
                const usedFinishes = new Set(PPF_COLORS.map(c => c.finish));
                return {
                    list: PPF_COLORS,
                    label: filmName,
                    sections: PPF_SECTIONS.filter(s => s.key === "all" || usedFinishes.has(s.key)),
                    sectionNames: PPF_SECTION_NAMES,
                    sectionOrder: PPF_SECTION_ORDER,
                    stockMap: STOCK_PPF,
                };
            }

            return null;
        }


        /* ===== МОДАЛ КАТЕГОРИЙ ===== */
        const catModalOverlay = document.getElementById("catModalOverlay");
        const catModalClose   = document.getElementById("catModalClose");
        const catModalTitle   = document.getElementById("catModalTitle");
        const catModalDesc    = document.getElementById("catModalDesc");
        const catModalFeatures= document.getElementById("catModalFeatures");
        const catModalCta     = document.getElementById("catModalCta");

        let _catFile = null;

        function openCategoryModal(title, data) {
            catModalTitle.textContent = title;
            catModalDesc.textContent = data.full;

            // Features
            catModalFeatures.innerHTML = (data.features || [])
                .map(f => `<div class="cat-modal-feature">${f}</div>`)
                .join("");

            // Store file key for CTA
            _catFile = Object.entries(categories).find(([,t]) => t === title)?.[0] || null;

            catModalOverlay.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        function closeCategoryModal() {
            catModalOverlay.classList.remove("show");
            document.body.style.overflow = "";
        }

        catModalClose.addEventListener("click", closeCategoryModal);
        catModalOverlay.addEventListener("click", (e) => {
            if (e.target === catModalOverlay) closeCategoryModal();
        });

        catModalCta.addEventListener("click", () => {
            closeCategoryModal();
            if (_catFile) loadCategory(_catFile);
        });

        // Swipe down to close on touch
        let _catSwipeY = 0;
        const catModal = document.getElementById("catModal");
        catModal.addEventListener("touchstart", (e) => { _catSwipeY = e.touches[0].clientY; }, { passive: true });
        catModal.addEventListener("touchend", (e) => {
            if (e.changedTouches[0].clientY - _catSwipeY > 80) closeCategoryModal();
        }, { passive: true });

        backBtn.addEventListener("click", () => {
            productContainer.style.display = "none";
            backBtn.style.display = "none";
            filters.style.display = "none";
            categoryContainer.style.display = "grid";
            productContainer.innerHTML = "";

            sortSelect.value = "";
            minPrice.value = "";
            maxPrice.value = "";

            categoryContainer.querySelectorAll(".category-card").forEach((card, index) => {
                card.classList.remove("show");
                setTimeout(() => card.classList.add("show"), index * 50);
            });

            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    </script>

    <!-- ===== МОДАЛ ОПИСАНИЯ КАТЕГОРИИ ===== -->
    <div id="catModalOverlay" class="cat-modal-overlay">
        <div class="cat-modal" id="catModal">
            <div class="cat-modal-handle"></div>
            <button class="cat-modal-close" id="catModalClose">&times;</button>
            <div class="cat-modal-body">
                <div class="cat-modal-label">Категория</div>
                <div class="cat-modal-title" id="catModalTitle"></div>
                <div class="cat-modal-divider"></div>
                <p class="cat-modal-desc" id="catModalDesc"></p>
                <div class="cat-modal-features" id="catModalFeatures"></div>
                <button class="cat-modal-cta" id="catModalCta">Смотреть товары →</button>
            </div>
        </div>
    </div>

</body>
